<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Do'a Harian Generator</title>
    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS disatukan di sini agar mudah digunakan dalam satu file */
        :root {
            --primary-color: #0284c7;
            --primary-hover: #0369a1;
            --bg-dashboard: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dashboard);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 32px;
        }

        .menu-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-item.active a, .nav-item a:hover {
            background-color: #f0f9ff;
            color: var(--primary-color);
        }

        /* Main Content Styling */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--bg-card);
            padding: 16px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .container {
            padding: 32px;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }

        /* Card Generator Styling */
        .generator-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            padding: 32px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: #fff;
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
        }

        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
        }

        .btn-generate {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .btn-generate:hover {
            background-color: var(--primary-hover);
        }

        /* Result Display Styling */
        .result-box {
            background-color: #fafafa;
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-top: 24px;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .doa-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 16px;
            text-align: center;
        }

        .doa-arabic {
            font-size: 1.75rem;
            line-height: 2.5rem;
            text-align: right;
            margin-bottom: 16px;
            font-weight: 500;
            padding: 12px 0;
            color: #0f172a;
        }

        .doa-latin {
            font-style: italic;
            color: var(--text-muted);
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .doa-translation {
            color: var(--text-main);
            line-height: 1.6;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-action {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .btn-action:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-color); }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-mosque"></i>
            <span>EduDo'a Panel</span>
        </div>
        <p class="menu-label">Menu Utama</p>
        <ul class="nav-links">
            <li class="nav-item active">
                <a href="#"><i class="fa-solid fa-house"></i> Generator</a>
            </li>
            <li class="nav-item">
                <a href="#"><i class="fa-solid fa-book-open"></i> Daftar Do'a</a>
            </li>
            <li class="nav-item">
                <a href="#"><i class="fa-solid fa-gear"></i> Pengaturan</a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header>
            <h2>Dashboard Generator Do'a</h2>
            <div class="user-profile">
                <div class="user-avatar">Admin</div>
            </div>
        </header>

        <div class="container">
            <div class="generator-card">
                <div class="form-group">
                    <label for="categorySelect"><i class="fa-solid fa-layer-group" style="color: var(--primary-color);"></i> Pilih Kategori Do'a</label>
                    <select id="categorySelect" class="form-select">
                        <option value="harian">Do'a Harian Umum</option>
                        <option value="belajar">Do'a Terkait Belajar & Sekolah</option>
                        <option value="orangtua">Do'a untuk Orang Tua</option>
                    </select>
                </div>
                
                <button class="btn-generate" onclick="generateDoa()">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Do'a Hari Ini
                </button>

                <!-- Box Hasil Tampilan -->
                <div id="resultBox" class="result-box">
                    <div id="doaTitle" class="doa-title">Nama Do'a</div>
                    <div id="doaArabic" class="doa-arabic">Arab</div>
                    <div id="doaLatin" class="doa-latin">Latin</div>
                    <div id="doaTranslation" class="doa-translation">Artinya</div>
                    
                    <div class="action-buttons">
                        <button class="btn-action" onclick="copyDoa()"><i class="fa-regular fa-copy"></i> Salin Teks</button>
                        <button class="btn-action" onclick="alert('Fitur Cetak/Ekspor siap dikembangkan!')"><i class="fa-solid fa-print"></i> Cetak Poster</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Logika Dummy Generator Sederhana -->
    <script>
        const databaseDoa = {
            harian: {
                title: "Do'a Sebelum Tidur",
                arabic: "بِاسْمِكَ اللَّهُمَّ أَحْيَا وَأَمُوتُ",
                latin: "Bismika allahumma ahya wa amuutu.",
                translation: "Dengan nama-Mu ya Allah aku hidup dan aku mati."
            },
            belajar: {
                title: "Do'a Sebelum Belajar",
                arabic: "رَبِّ زِدْنِي عِلْمًا وَارْزُقْنِي فَهْمًا",
                latin: "Rabbi zidnii 'ilman warzuqnii fahman.",
                translation: "Ya Tuhanku, tambahkanlah kepadaku ilmu dan berikanlah aku pengertian yang baik."
            },
            orangtua: {
                title: "Do'a untuk Kedua Orang Tua",
                arabic: "رَبِّ اغْفِرْ لِي وَلِوَالِدَيَّ وَارْحَمْهُمَا كَمَا رَبَّيَانِي صَغِيرًا",
                latin: "Rabbighfir lii wa liwaalidayya warhamhumaa kamaa rabbayaanii shaghiiraa.",
                translation: "Ya Tuhanku, ampunilah aku dan kedua orang tuaku, dan sayangilah keduanya sebagaimana mereka berdua telah mendidik aku di waktu kecil."
            }
        };

        function generateDoa() {
            const category = document.getElementById('categorySelect').value;
            const data = databaseDoa[category];
            
            if (data) {
                document.getElementById('doaTitle').innerText = data.title;
                document.getElementById('doaArabic').innerText = data.arabic;
                document.getElementById('doaLatin').innerText = data.latin;
                document.getElementById('doaTranslation').innerText = "Artinya: \"" + data.translation + "\"";
                
                document.getElementById('resultBox').style.display = 'block';
            }
        }

        function copyDoa() {
            const title = document.getElementById('doaTitle').innerText;
            const arab = document.getElementById('doaArabic').innerText;
            const latin = document.getElementById('doaLatin').innerText;
            const arti = document.getElementById('doaTranslation').innerText;
            
            const fullText = `${title}\n\n${arab}\n\n${latin}\n\n${arti}`;
            
            navigator.clipboard.writeText(fullText).then(() => {
                alert("Do'a berhasil disalin ke clipboard!");
            });
        }
    </script>
</body>
</html>
